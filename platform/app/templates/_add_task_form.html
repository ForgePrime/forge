{# Add-new-task form. Expects: project, objectives (list for origin select) #}
<details class="bg-white rounded shadow p-4">
    <summary class="cursor-pointer font-semibold text-blue-600">+ Dodaj Task manualnie</summary>
    <form hx-post="/ui/projects/{{project}}/tasks/new"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) window.location.reload()"
          class="mt-3 space-y-2">
        <div class="flex gap-2">
            <input name="external_id" placeholder="T-NNN (auto)" class="w-32 border rounded px-2 py-1 text-xs mono">
            <select name="type" class="border rounded px-2 py-1 text-xs">
                <option value="feature">feature</option>
                <option value="bug">bug</option>
                <option value="chore">chore</option>
                <option value="investigation">investigation</option>
            </select>
            <select name="origin" class="border rounded px-2 py-1 text-xs">
                <option value="">(no objective)</option>
                {% for o in objectives %}
                <option value="{{ o.external_id }}">{{ o.external_id }} — {{ o.title[:50] }}</option>
                {% endfor %}
            </select>
        </div>
        <input name="name" required placeholder="Krótka nazwa taska"
               class="w-full border rounded px-2 py-1 font-semibold text-sm">
        <textarea name="instruction" rows="3" placeholder="Instrukcja: co ma być zrobione, jakie pliki, jakie endpointy"
                  class="w-full border rounded px-2 py-1 text-sm mono"></textarea>
        <div class="flex gap-2">
            <input name="scopes" placeholder="scopes comma-separated" class="flex-1 border rounded px-2 py-1 text-xs">
            <input name="completes_kr_ids" placeholder="KR0,KR1" class="w-32 border rounded px-2 py-1 text-xs mono">
        </div>
        <input name="requirement_refs" placeholder="SRC-001 §X; SRC-002 §Y (opcjonalne)" class="w-full border rounded px-2 py-1 text-xs">
        <button type="submit" class="bg-green-600 text-white px-3 py-1 text-sm rounded hover:bg-green-700">Utwórz Task</button>
    </form>
</details>
