{# Add-new-objective form (collapsed by default). Expects: project #}
<details class="bg-white rounded shadow p-4">
    <summary class="cursor-pointer font-semibold text-blue-600">+ Dodaj Objective manualnie</summary>
    <form hx-post="/ui/projects/{{project}}/objectives/new"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) window.location.reload()"
          class="mt-3 space-y-2">
        <div class="flex gap-2">
            <input name="external_id" placeholder="O-NNN (auto jeśli puste)" class="w-40 border rounded px-2 py-1 text-xs mono">
            <input name="priority" type="number" min="1" max="5" value="3" class="w-20 border rounded px-2 py-1 text-xs" title="Priority 1-5">
        </div>
        <input name="title" required placeholder="Tytuł celu biznesowego"
               class="w-full border rounded px-2 py-1 font-semibold text-sm">
        <textarea name="business_context" required rows="3" minlength="10" placeholder="Kontekst biznesowy: dlaczego, dla kogo, jaki problem (min 10 znaków)"
                  class="w-full border rounded px-2 py-1 text-sm"></textarea>
        <input name="scopes" placeholder="backend,frontend,database (opcjonalne)"
               class="w-full border rounded px-2 py-1 text-xs">
        <button type="submit" class="bg-green-600 text-white px-3 py-1 text-sm rounded hover:bg-green-700">Utwórz Objective</button>
    </form>
</details>
