{# Add new guideline. Expects: project #}
<details class="bg-white rounded shadow p-4">
    <summary class="cursor-pointer font-semibold text-blue-600">+ Dodaj guideline</summary>
    <form hx-post="/ui/projects/{{project}}/guidelines"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful) window.location.reload()"
          class="mt-3 space-y-2">
        <div class="flex gap-2">
            <select name="weight" class="border rounded px-2 py-1 text-xs">
                <option value="must">must</option>
                <option value="should" selected>should</option>
                <option value="may">may</option>
            </select>
            <input name="scope" placeholder="scope (np. backend, default: general)" class="flex-1 border rounded px-2 py-1 text-xs" value="general">
        </div>
        <input name="title" required placeholder="Krótki tytuł (np. 'StorageAdapter Protocol')" class="w-full border rounded px-2 py-1 font-semibold text-sm">
        <textarea name="content" required rows="3" placeholder="Treść guideline (np. 'All data access through StorageAdapter Protocol. No direct DB access.')"
                  class="w-full border rounded px-2 py-1 text-sm"></textarea>
        <input name="rationale" placeholder="Rationale: dlaczego ten guideline (opcjonalne)" class="w-full border rounded px-2 py-1 text-xs">
        <button type="submit" class="bg-green-600 text-white px-3 py-1 text-sm rounded hover:bg-green-700">Dodaj guideline</button>
    </form>
</details>
