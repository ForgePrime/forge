name: ADR Gate Pipeline

# Stage 28.4 of Deterministic ADR Gate Pipeline (task #28).
# Runs the deterministic validators on every PR touching ADRs, migration
# drafts, or schema files. Per CONTRACT §B.8(a): deterministic checks
# substitute for human review on the *correctness portion* of submissions;
# human distinct-actor reserved for *judgment portions*.
#
# Stage 28.1 — ADR format validator (R1..R8 + R9 in --strict)
# Stage 28.2a — SQL migration Forge-convention validator (M1..M9)
# Stage 28.2b — Live PG up/down/up cycle (TODO; placeholder job)
# Stage 28.3 — Pydantic schema validator (TODO; placeholder job)
# Stage 28.4 — This file (lifecycle state machine + workflow wiring)

on:
  pull_request:
    paths:
      - 'platform/docs/decisions/**'
      - 'platform/docs/migrations_drafts/**'
      - 'platform/app/schemas/**'
      - 'platform/scripts/validate_*.py'
      - 'platform/tests/test_validate_*.py'
      - '.github/workflows/adr-gate.yml'
  push:
    branches: [main]
    paths:
      - 'platform/docs/decisions/**'
      - 'platform/docs/migrations_drafts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Stage 28.1 — ADR format
  adr-format:
    name: 'Stage 28.1: ADR format validator'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Run validate_adr.py --strict (W2 → R9 visibly)
        run: python platform/scripts/validate_adr.py --strict
      - name: Run validate_adr unit tests
        run: python -m pytest platform/tests/test_validate_adr.py -q

  # Stage 28.2a — SQL migration Forge conventions
  migration-convention:
    name: 'Stage 28.2a: SQL migration validator'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Run validate_migration.py --strict
        run: python platform/scripts/validate_migration.py --strict
      - name: Run validate_migration unit tests
        run: python -m pytest platform/tests/test_validate_migration.py -q

  # Stage 28.4 — ADR lifecycle state machine
  adr-lifecycle:
    name: 'Stage 28.4: ADR lifecycle state machine'
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          # Need full history so --base ${{ base_ref }} can resolve
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Fetch base ref
        run: git fetch --no-tags --depth=1 origin ${{ github.base_ref }}
      - name: Validate ADR transitions vs origin/${{ github.base_ref }}
        run: |
          python platform/scripts/validate_adr_lifecycle.py \
            --base origin/${{ github.base_ref }}
      - name: Run validate_adr_lifecycle unit tests
        run: python -m pytest platform/tests/test_validate_adr_lifecycle.py -q

  # Stage 28.2b — Live PG up/down/up cycle.
  # Spawns ephemeral Postgres, bootstraps baseline schema from
  # app.models metadata (Base.metadata.create_all), then applies the
  # migration up(), down(), up() again, asserting:
  #   - up() applies cleanly
  #   - down() reverses to byte-identical baseline (S0 == S2)
  #   - up() is deterministic (S1 == S3)
  # See PLAN_ADR_GATE_PIPELINE.md §4b.
  migration-live-cycle:
    name: 'Stage 28.2b: live PG up/down/up cycle'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: forge
          POSTGRES_PASSWORD: forge
          POSTGRES_DB: forge_migration_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U forge"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install platform deps + psycopg2
        working-directory: platform
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install psycopg2-binary
      - name: Bootstrap baseline schema from app.models metadata
        working-directory: platform
        env:
          FORGE_DATABASE_URL: postgresql://forge:forge@localhost:5432/forge_migration_test
        run: |
          python -c "
          from sqlalchemy import create_engine
          from app.database import Base
          from app import models  # noqa: F401 — registers all model tables on Base.metadata
          eng = create_engine('postgresql://forge:forge@localhost:5432/forge_migration_test')
          # Strip Phase 1 tables from metadata (they're under test) so
          # baseline matches pre-Phase-1 state.
          phase1_tables = {'alternatives','side_effect_map','cascade_dod_item','kill_criteria_event_log','trust_debt_snapshot'}
          for tname in phase1_tables:
              if tname in Base.metadata.tables:
                  Base.metadata.remove(Base.metadata.tables[tname])
          # Strip Phase 1 columns too (stage, autonomy_pinned, epistemic_tag)
          # — these are added by ALTER in the migration under test.
          for tn, col_to_drop in [('objectives','stage'),('objectives','autonomy_pinned'),
                                   ('decisions','epistemic_tag'),('acceptance_criteria','epistemic_tag')]:
              if tn in Base.metadata.tables and col_to_drop in Base.metadata.tables[tn].columns:
                  Base.metadata.tables[tn]._columns.remove(Base.metadata.tables[tn].columns[col_to_drop])
          Base.metadata.create_all(eng)
          print('baseline schema applied')
          "
      - name: Run up/down/up cycle on Phase 1 migration
        working-directory: platform
        run: |
          python scripts/validate_migration_cycle.py \
            --sql docs/migrations_drafts/2026_04_26_phase1_redesign.sql \
            --db-url postgresql://forge:forge@localhost:5432/forge_migration_test
      - name: Run cycle validator parser unit tests
        working-directory: platform
        run: python -m pytest tests/test_validate_migration_cycle.py -q

  # Stage 28.3 — Pydantic schema validator (ENABLED 2026-04-25 after
  # app/schemas/side_effect_map.py landed for ADR-028 D3 ImpactDelta).
  pydantic-schema:
    name: 'Stage 28.3: Pydantic schema (round-trip + mypy strict)'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install platform deps (Pydantic 2.x + pytest)
        working-directory: platform
        run: |
          python -m pip install --upgrade pip
          pip install pydantic pytest
      - name: Round-trip property tests on app/schemas/
        working-directory: platform
        run: python -m pytest tests/test_impact_delta_round_trip.py -q
      - name: mypy --strict on app/schemas/
        working-directory: platform
        run: |
          pip install mypy
          mypy --strict app/schemas/ || echo "::warning::mypy --strict findings — review before flipping to fail"
        continue-on-error: true  # Starter: non-blocking until baseline clean.

  # Aggregate gate: all required jobs must pass for the ADR gate to be green.
  # Branch protection rule should require this status check before merge.
  adr-gate-pass:
    name: 'ADR Gate Pipeline (composite)'
    needs: [adr-format, migration-convention, adr-lifecycle, pydantic-schema, migration-live-cycle]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Composite status
        run: |
          echo "format:        ${{ needs.adr-format.result }}"
          echo "migration:     ${{ needs.migration-convention.result }}"
          echo "lifecycle:     ${{ needs.adr-lifecycle.result }}"
          echo "pydantic:      ${{ needs.pydantic-schema.result }}"
          echo "live-cycle:    ${{ needs.migration-live-cycle.result }}"
          if [[ "${{ needs.adr-format.result }}" != "success" ]] || \
             [[ "${{ needs.migration-convention.result }}" != "success" ]] || \
             [[ "${{ needs.adr-lifecycle.result }}" != "success" && "${{ github.event_name }}" == "pull_request" ]] || \
             [[ "${{ needs.pydantic-schema.result }}" != "success" ]] || \
             [[ "${{ needs.migration-live-cycle.result }}" != "success" ]]; then
            echo "::error::One or more ADR Gate stages failed"
            exit 1
          fi
          echo "ADR Gate Pipeline: ALL STAGES GREEN"
