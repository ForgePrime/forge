# Pre-commit hooks — run before each `git commit`.
#
# Install:  pip install pre-commit && pre-commit install
# Update:   pre-commit autoupdate
# Run all:  pre-commit run --all-files
#
# Starter config. Each hook is non-disruptive (won't block common cases)
# until baseline is clean. After a clean baseline, tighten by setting
# `always_run: true` + flipping `continue-on-error` equivalents (where
# applicable) to fail the commit on issues.

repos:
  # --- Standard hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: debug-statements    # catches `breakpoint()` / `pdb.set_trace()`
      - id: detect-private-key  # safety net against committing SSH / API keys

  # --- Python lint + format (ruff) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.0
    hooks:
      - id: ruff
        args: ['--exit-zero']   # non-blocking until baseline clean
      - id: ruff-format
        args: ['--check']
        # Starter: check-only (no auto-fix) so commits don't mysteriously
        # rewrite. Flip to auto-format once team agrees on style config.

  # --- Python security (bandit) ---
  - repo: https://github.com/PyCQA/bandit
    rev: '1.7.9'
    hooks:
      - id: bandit
        args: ['-lll', '-r', 'platform/app', '-x', 'platform/tests']
        # Only report HIGH severity. MEDIUM findings tend to be noisy
        # in FastAPI+SQLAlchemy apps (SQL string construction flagged
        # as B608 even when using bind params). Tighten to -ll once
        # false-positive baseline is suppressed inline with # nosec.

  # --- Secret detection (gitleaks) ---
  # Optional — add if your team wants stronger protection against
  # accidental credential commits than the stdlib detect-private-key above.
  # - repo: https://github.com/gitleaks/gitleaks
  #   rev: v8.18.4
  #   hooks:
  #     - id: gitleaks

  # --- Local hooks ---
  - repo: local
    hooks:
      # PLAN_GATE_ENGINE A.4 cutover invariant: zero direct
      # `entity.status = "X"` outside the canonical write-path
      # (app/validation/state_transition.py). Detected via grep.
      # Catches ad-hoc reintroduction of bypass paths after the
      # 33-site cutover landed in commit (this commit).
      - id: no-direct-status-assign
        name: 'A.4 invariant: no direct .status = "X" outside state_transition'
        entry: bash -c 'matches=$(grep -rn "\.status\s*=\s*[\"\x27]" platform/app --include="*.py" 2>/dev/null | grep -v "verdict_engine\|state_transition\|__pycache__"); if [ -n "$matches" ]; then echo "FAIL — direct .status= outside state_transition.py:"; echo "$matches"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      # Stage 28.1 of Deterministic ADR Gate Pipeline (task #28).
      # Runs validate_adr.py against all ADRs. Pre-existing drift is
      # filtered by .adr_validator_baseline.json next to the ADRs;
      # NEW issues fail the commit. CI uses --strict (warnings also fail;
      # W2 is escalated to R9 visibly in --strict).
      - id: validate-adr
        name: 'Stage 28.1: ADR format validator (deterministic gate)'
        entry: python platform/scripts/validate_adr.py
        language: system
        pass_filenames: false
        files: '^platform/docs/decisions/ADR-.*\.md$'

      # Stage 28.2a of Deterministic ADR Gate Pipeline (task #28).
      # Validates Forge SQL migration conventions (header, BEGIN/COMMIT,
      # reversal §99 pairing, verification §101, idempotency markers).
      # Pre-existing drift filtered by .migration_validator_baseline.json.
      # Live PG up/down/up cycle is Stage 28.2b (deferred to CI workflow
      # in Stage 28.4 — requires Docker).
      - id: validate-migration
        name: 'Stage 28.2a: SQL migration validator (Forge conventions)'
        entry: python platform/scripts/validate_migration.py
        language: system
        pass_filenames: false
        files: '^platform/docs/migrations_drafts/.*\.sql$'

      # Stage 28.3 of Deterministic ADR Gate Pipeline (task #28).
      # Pydantic round-trip property tests on app/schemas/ — catches AI
      # silent-fill bugs (wrong type into discriminated-union variant,
      # missing discriminator, extra fields) at commit time.
      - id: validate-pydantic-schemas
        name: 'Stage 28.3: Pydantic schema round-trip (ADR-028 D3 self-adjointness)'
        entry: bash -c 'cd platform && python -m pytest tests/test_impact_delta_round_trip.py -q'
        language: system
        pass_filenames: false
        files: '^platform/(app/schemas/.*\.py|tests/test_impact_delta_round_trip\.py)$'
