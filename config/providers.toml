# Forge LLM Provider Configuration
# Configure API keys and model preferences for LLM providers.
# API keys: set via environment variables (ANTHROPIC_API_KEY, OPENAI_API_KEY).

[anthropic]
provider = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"
model = "claude-sonnet-4-20250514"

[openai]
provider = "openai"
api_key_env = "OPENAI_API_KEY"
model = "gpt-4o"

# Uncomment for local Ollama:
# [local]
# provider = "ollama"
# model = "llama3.1"
# base_url = "http://localhost:11434"
# context_window = 8192
