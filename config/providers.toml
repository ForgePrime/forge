# Forge LLM Provider Configuration
# Configure API keys and model preferences for LLM providers.
# API keys: set via environment variables (ANTHROPIC_API_KEY, OPENAI_API_KEY).

[anthropic]
provider = "anthropic"
api_key_env = "ANTHROPIC_API_KEY"
model = "claude-sonnet-4-6"

[openai]
provider = "openai"
api_key_env = "OPENAI_API_KEY"
model = "gpt-4o"

[claude-code]
provider = "claude-code"
model = "sonnet"
# claude_binary = "claude"
# timeout = 120
# max_concurrent = 5

